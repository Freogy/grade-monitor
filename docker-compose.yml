version: "3.8"

services:
  grade-monitor:
    build: .
    container_name: grade-monitor
    restart: unless-stopped
    volumes:
      - ./.env:/app/.env:ro
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - DATA_DIR=/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
