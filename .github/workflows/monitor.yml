name: 成绩监控

on:
  schedule:
    # 每15分钟运行一次 (UTC时间)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # 支持手动触发测试

permissions:
  contents: write  # 允许 git push 更新数据库

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 缓存 pip 依赖
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 生成配置文件
        run: |
          cat > .env << 'EOF'
          PORTAL_URL=${{ secrets.PORTAL_URL }}
          STUDENT_ID=${{ secrets.STUDENT_ID }}
          PASSWORD=${{ secrets.PASSWORD }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          SMTP_AUTH_CODE=${{ secrets.SMTP_AUTH_CODE }}
          RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}
          CHECK_INTERVAL=15
          EOF
          echo ".env 已生成"

      - name: 执行成绩检查
        run: python monitor.py --once

      - name: 提交更新的数据库
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/grades.db
          if git diff --cached --quiet; then
            echo "数据库无变化，跳过提交"
          else
            git commit -m "📊 更新成绩数据库 [skip ci]"
            git push
            echo "数据库已提交并推送"
          fi
